{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 500px; padding: 40px 30px; text-align: center;">
    <div style="font-size: 45px; margin-bottom: 10px;">🔐</div>
    <h2 style="font-family: 'Syne', sans-serif; font-size: 24px; color: #fbc531; margin-bottom: 10px;">Account Recovery</h2>
    <p style="color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 30px;">Verify your identity to reset your password.</p>
    
    <form method="POST" action="{{ url_for('forgot_password') }}" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="number" name="employee_id" placeholder="Your Employee/Admin ID" min="1" onkeypress="return event.charCode >= 48 && event.charCode <= 57" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff;">

        <div style="text-align: left;">
            <label style="color: rgba(255,255,255,0.6); font-size: 12px; margin-bottom: 5px; margin-left: 10px;">Verify Date of Birth</label>
            <input type="date" name="dob" required class="form-input recovery-input" style="color-scheme: dark;">
        </div>
        
        <button type="submit" class="btn-primary" style="background: linear-gradient(135deg, rgba(251, 197, 49, 0.15) 0%, rgba(251, 197, 49, 0.05) 100%); border-color: #fbc531; text-shadow: 0 0 10px rgba(251, 197, 49, 0.5); margin-top: 10px; padding: 14px;">Verify Identity</button>
    </form>
    
    <div style="margin-top: 20px;">
        <a href="{{ url_for('index') }}" style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px; transition: 0.3s;">&larr; Cancel and return</a>
    </div>
</div>

<style>
    .form-input { width: 100%; padding: 14px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif; transition: all 0.3s ease;}
    .recovery-input:focus { outline: none; border-color: #fbc531; box-shadow: 0 0 15px rgba(251, 197, 49, 0.4);}
</style>
{% endblock %}
