{% extends 'base.html' %}
{% block content %}
<div class="glass-panel" style="max-width: 450px; text-align: center; padding: 50px 40px;">
    <div style="display: inline-block; padding: 5px 15px; background: rgba(255, 0, 212, 0.2); border: 1px solid var(--secondary); border-radius: 20px; color: var(--secondary); font-size: 12px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;">Admin Portal</div>
    <h2 style="font-family: 'Syne', sans-serif; font-size: 28px; color: #fff; margin-bottom: 30px;">HR Authentication</h2>
    
    <form method="POST" action="{{ url_for('hr_login') }}" style="display: flex; flex-direction: column; gap: 20px;">
        <input type="number" name="employee_id" placeholder="Admin ID" min="1" onkeypress="return event.charCode >= 48 && event.charCode <= 57" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff;">
        <div style="display: flex; flex-direction: column; text-align: left;">
            <input type="password" name="password" placeholder="Admin Password" required class="form-input hr-input">
            <a href="{{ url_for('forgot_password') }}" style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px; margin-top: 8px; margin-left: 10px; transition: 0.3s; width: fit-content;" onmouseover="this.style.color='var(--secondary)'" onmouseout="this.style.color='rgba(255,255,255,0.5)'">Forgot Password?</a>
        </div>
        <button type="submit" class="btn-primary" style="margin-top: 10px; background: linear-gradient(135deg, rgba(255, 0, 212, 0.15) 0%, rgba(157, 78, 221, 0.15) 100%); border-color: var(--secondary); text-shadow: 0 0 10px var(--glow-magenta);">Authorize Login</button>
    </form>
    
    <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
        <p style="color: rgba(255,255,255,0.6); font-size: 14px;">Authorized HR Only. <a href="{{ url_for('hr_register') }}" style="color: var(--secondary); text-decoration: none; font-weight: 600;">Request Access</a></p>
    </div>
</div>
<style>
    .form-input { width: 100%; padding: 16px 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif; transition: all 0.3s ease;}
    .hr-input:focus { outline: none; border-color: var(--secondary); box-shadow: 0 0 15px var(--glow-magenta);}
</style>
{% endblock %}
