{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 500px; text-align: center;">
    <div style="display: inline-block; padding: 5px 15px; background: rgba(0, 240, 255, 0.2); border: 1px solid var(--primary); border-radius: 20px; color: var(--primary); font-size: 12px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Security</div>
    
    <h2 style="font-family: 'Syne', sans-serif; font-size: 32px; color: #fff; margin-bottom: 10px;">Change Password</h2>
    <p style="color: rgba(255,255,255,0.7); margin-bottom: 30px;">Update your system access credentials.</p>

    <form action="{{ url_for('change_password') }}" method="POST" style="text-align: left;">
        
        <div style="margin-bottom: 15px;">
            <label style="color: var(--primary); font-size: 14px;">Current Password</label>
            <input type="password" name="current_password" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff;">
        </div>

        <div style="margin-bottom: 30px;">
            <label style="color: var(--primary); font-size: 14px;">New Password</label>
            <input type="password" id="new_password" name="new_password" required pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[@$!%*?&#]).{8,}" title="Must contain at least one number, one uppercase, one lowercase letter, one special character, and at least 8 or more characters" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff;">
        </div>

        <button type="submit" class="btn-primary">Update Password</button>
        <div style="margin-top: 20px; text-align: center;">
    {% if session.get('role') == 'HR' %}
        <a href="{{ url_for('hr_dashboard') }}" class="btn-secondary" style="width: auto; padding: 10px 20px; text-decoration: none;">&larr; Cancel and Return</a>
    {% else %}
        <a href="{{ url_for('dashboard') }}" class="btn-secondary" style="width: auto; padding: 10px 20px; text-decoration: none;">&larr; Cancel and Return</a>
    {% endif %}
</div>
    </form>
</div>
{% endblock %}
