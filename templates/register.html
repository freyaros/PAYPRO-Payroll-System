{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; text-align: center;">
    <h2 style="font-family: 'Syne', sans-serif; font-size: 32px; color: var(--primary); margin-bottom: 10px;">Join the Team</h2>
    <p style="color: rgba(255,255,255,0.7); margin-bottom: 30px;">Submit your details. HR will assign your ID and temporary password.</p>

    <form action="{{ url_for('register') }}" method="POST" style="text-align: left;">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
            <div>
                <label style="color: var(--primary); font-size: 14px;">First Name</label>
                <input type="text" name="first_name" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff;">
            </div>
            <div>
                <label style="color: var(--primary); font-size: 14px;">Last Name</label>
                <input type="text" name="last_name" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
            <div>
                <label style="color: var(--primary); font-size: 14px;">Date of Birth</label>
                <input type="date" name="dob" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff; color-scheme: dark;">
            </div>
            <div>
                <label style="color: var(--primary); font-size: 14px;">Gender</label>
                <select name="gender" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff;">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <label style="color: var(--primary); font-size: 14px;">Job Title</label>
            <input type="text" name="job_title" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff;">
        </div>
            
        <div style="margin-bottom: 30px;">
    <label style="color: var(--primary); font-size: 14px;">Contact Number</label>
    <input type="text" name="contact" pattern="[6-9][0-9]{9}" title="Enter a valid 10-digit mobile number starting with 6,7,8 or 9" maxlength="10" required style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: #fff;">
</div>

        <button type="submit" class="btn-primary">Submit Request to HR</button>
        <a href="{{ url_for('employee_login') }}" class="btn-secondary">Back to Login</a>
    </form>
</div>
{% endblock %}
